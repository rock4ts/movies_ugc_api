name: ugc-api-test

services:
  kafka:
    image: apache/kafka:4.1.0
    ports:
      - "9094:9092"
      - "29093:29092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,PLAINTEXT_HOST://:29092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29093
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_DEFAULT_REPLICATION_FACTOR=1
      - KAFKA_NUM_PARTITIONS=6
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  kafka-init:
    image: apache/kafka:4.1.0
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /bin/bash
      - -c
      - >-
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists
        --bootstrap-server kafka:9092 --topic ugc-events-test
        --partitions 3 --replication-factor 1 &&
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists
        --bootstrap-server kafka:9092 --topic ugc-anonymous-events-test
        --partitions 3 --replication-factor 1

  ugc-api:
    build: .
    env_file:
      - .env.tests
    ports:
      - "18000:8000"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - ./tests/docker/certs/jwt-public.pem:/run/secrets/jwt/jwt-public.pem:ro
